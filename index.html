<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Availability</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .loading {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 2rem;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 2rem;
        }

        .updated {
            text-align: center;
            margin-top: 1rem;
            font-size: 1rem;
            color: gray;
        }
    </style>
</head>

<body>

<header class="banner">
    <img src="ITSLogo.jpg" alt="ITS Logo">
</header>

<div class="wrapper">
    <div class="container">
        <div id="info"></div>
        <div id="view1"></div>
    </div>
</div>

<div id="updated" class="updated"></div>

<script>

const API_URL = "./rooms.json";

async function fetchRoomData() {

    try {

        document.getElementById("view1").innerHTML =
            '<div class="loading">Loading...</div>';

        const response = await fetch(API_URL);

        if (!response.ok) {
            throw new Error("Failed to fetch data");
        }

        const data = await response.json();

        renderAvailabilityTable(data.view1);

        renderInfoTable(data.info);

        renderUpdatedTime(data.updated);

    } catch (error) {

        console.error(error);

        document.getElementById("view1").innerHTML = `
            <div class="error">
                Failed to fetch room data.
            </div>
        `;
    }
}

function renderAvailabilityTable(data) {

    let html = `
        <table>
            <thead>
                <tr>
                    <th>Next Room At</th>
                    <th>Duration</th>
                </tr>
            </thead>
            <tbody>
    `;

    data.forEach(row => {

        html += `
            <tr>
                <td>${row.start}</td>
                <td>${row.duration}</td>
            </tr>
        `;
    });

    html += `
            </tbody>
        </table>
    `;

    document.getElementById("view1").innerHTML = html;
}

function renderInfoTable(info) {

    let html = `
        <table>
            <thead>
                <tr>
                    <th>Items</th>
                    <th>Reservation Time</th>
                </tr>
            </thead>
            <tbody>
    `;

    info.forEach(item => {

        html += `
            <tr>
                <td>${item.item}</td>
                <td>${item.reservation}</td>
            </tr>
        `;
    });

    html += `
            </tbody>
        </table>
    `;

    document.getElementById("info").innerHTML = html;
}

function renderUpdatedTime(updated) {

    const date = new Date(updated);

    document.getElementById("updated").innerHTML =
        `Last Updated: ${date.toLocaleString()}`;
}

fetchRoomData();

setInterval(fetchRoomData, 5000);

</script>

</body>

</html>
